<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="brush">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FAF5E8"/>
      <stop offset="100%" stop-color="#EDE0C4"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- 먹 번짐 그림자 -->
  <ellipse cx="100" cy="192" rx="24" ry="5" fill="#2A1F0E" opacity="0.18" filter="url(#soft)"/>

  <!-- 줄기 -->
  <g filter="url(#brush)">
    <path d="M100 188 Q99 165 98 140 Q97 115 100 85 Q101 72 100 58" stroke="#1C150A" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.88"/>
    <path d="M100 188 Q101 168 102 145" stroke="#0E0A04" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- 아랫가지 -->
  <g filter="url(#brush)" opacity="0.8">
    <path d="M99 158 Q78 151 58 146" stroke="#1C150A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M99 158 Q120 151 140 145" stroke="#1C150A" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 중간가지 -->
  <g filter="url(#brush)" opacity="0.78">
    <path d="M99 128 Q74 120 52 114" stroke="#1C150A" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <path d="M99 128 Q124 119 146 113" stroke="#1C150A" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 윗가지 -->
  <g filter="url(#brush)" opacity="0.76">
    <path d="M99 100 Q80 93 63 87" stroke="#1C150A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M99 100 Q118 92 135 86" stroke="#1C150A" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 잎 뭉치 — 붓으로 툭툭 찍은 느낌 -->
  <g filter="url(#brush)" opacity="0.82">
    <ellipse cx="58" cy="141" rx="22" ry="11" fill="#1C150A" transform="rotate(-14,58,141)"/>
    <ellipse cx="140" cy="140" rx="22" ry="11" fill="#1C150A" transform="rotate(14,140,140)"/>
    <ellipse cx="52" cy="109" rx="24" ry="12" fill="#1C150A" transform="rotate(-8,52,109)"/>
    <ellipse cx="146" cy="108" rx="24" ry="12" fill="#1C150A" transform="rotate(8,146,108)"/>
    <ellipse cx="63" cy="82" rx="19" ry="10" fill="#1C150A" transform="rotate(-5,63,82)"/>
    <ellipse cx="135" cy="81" rx="19" ry="10" fill="#1C150A" transform="rotate(5,135,81)"/>
    <ellipse cx="100" cy="56" rx="20" ry="26" fill="#1C150A"/>
    <ellipse cx="100" cy="48" rx="13" ry="16" fill="#0E0A04" opacity="0.5"/>
  </g>

  <!-- 솔방울 — 자주색 포인트 -->
  <g filter="url(#soft)">
    <ellipse cx="68" cy="101" rx="5" ry="7" fill="#7B4FA8" opacity="0.78" transform="rotate(-10,68,101)"/>
    <ellipse cx="131" cy="100" rx="5" ry="7" fill="#7B4FA8" opacity="0.78" transform="rotate(10,131,100)"/>
    <ellipse cx="100" cy="74" rx="4.5" ry="6.5" fill="#8A5DC0" opacity="0.82"/>
    <ellipse cx="58" cy="133" rx="4" ry="5.5" fill="#7B4FA8" opacity="0.65" transform="rotate(-12,58,133)"/>
    <ellipse cx="141" cy="132" rx="4" ry="5.5" fill="#7B4FA8" opacity="0.65" transform="rotate(12,141,132)"/>
  </g>

  <!-- 낙관 -->
  <rect x="160" y="158" width="26" height="26" rx="2" fill="#B03020" opacity="0.15"/>
  <text x="173" y="176" text-anchor="middle" font-size="8" fill="#B03020" opacity="0.5" font-family="serif">구상</text>
</svg>
