<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="brush">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.0"/></filter>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FAF5E8"/>
      <stop offset="100%" stop-color="#EDE0C4"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- 수면 -->
  <g filter="url(#soft)" opacity="0.2">
    <path d="M30 178 Q65 172 100 178 Q135 184 170 178" stroke="#1C2830" stroke-width="1.5" fill="none"/>
    <path d="M40 182 Q70 177 100 182 Q130 187 160 182" stroke="#1C2830" stroke-width="1" fill="none"/>
  </g>

  <!-- 긴 다리 -->
  <g filter="url(#brush)" opacity="0.8">
    <path d="M90 155 Q88 165 86 175 Q84 180 82 185" stroke="#1C2830" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M110 155 Q112 165 114 175 Q116 180 118 185" stroke="#1C2830" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- 발 -->
    <path d="M82 185 Q76 188 70 187 M82 185 Q80 190 76 193 M82 185 Q84 190 83 193" stroke="#1C2830" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M118 185 Q124 188 130 187 M118 185 Q120 190 124 193 M118 185 Q116 190 117 193" stroke="#1C2830" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 몸통 -->
  <g filter="url(#brush)">
    <ellipse cx="100" cy="132" rx="30" ry="28" fill="#2A3038" opacity="0.78"/>
    <ellipse cx="100" cy="126" rx="20" ry="18" fill="#F0EAD6" opacity="0.55"/>
    <ellipse cx="100" cy="130" rx="14" ry="20" fill="#F0EAD6" opacity="0.4"/>
  </g>

  <!-- 날개 — 회색빛 붓터치 -->
  <g filter="url(#brush)" opacity="0.7">
    <path d="M72 120 Q55 128 48 138 Q44 145 48 150 Q60 145 75 138 Q85 132 88 125 Z" fill="#3A4048"/>
    <path d="M128 120 Q145 128 152 138 Q156 145 152 150 Q140 145 125 138 Q115 132 112 125 Z" fill="#3A4048"/>
  </g>

  <!-- 목 — S자 곡선 -->
  <g filter="url(#brush)">
    <path d="M100 108 Q96 90 98 72 Q100 55 102 42 Q104 32 100 22" stroke="#2A3038" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.82"/>
    <path d="M100 108 Q104 90 102 72 Q100 55 98 42" stroke="#F0EAD6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- 머리 -->
  <g filter="url(#brush)">
    <ellipse cx="100" cy="22" rx="14" ry="11" fill="#2A3038" opacity="0.88"/>
    <!-- 흰 머리 -->
    <ellipse cx="100" cy="20" rx="9" ry="7" fill="#F0EAD6" opacity="0.6"/>
    <!-- 검은 눈선 -->
    <path d="M88 18 Q94 16 104 18 Q110 20 114 22" stroke="#0A0E14" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- 부리 — 길고 뾰족 -->
  <g filter="url(#brush)">
    <path d="M100 22 Q98 14 96 5 Q95 0 94 -4" stroke="#8A7830" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M100 22 Q102 14 104 5" stroke="#8A7830" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- 눈 -->
  <circle cx="108" cy="20" r="3.5" fill="#0A0E14" opacity="0.9" filter="url(#brush)"/>
  <circle cx="109" cy="19" r="1" fill="#FAF5E8" opacity="0.8"/>

  <!-- 낙관 -->
  <rect x="160" y="158" width="26" height="26" rx="2" fill="#B03020" opacity="0.15"/>
  <text x="173" y="176" text-anchor="middle" font-size="7" fill="#B03020" opacity="0.5" font-family="serif">왜가리</text>
</svg>
