<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="brush">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.3"/></filter>
    <radialGradient id="bg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#FAF5E8"/>
      <stop offset="100%" stop-color="#EDE0C4"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- 수면 번짐 -->
  <g filter="url(#soft)" opacity="0.22">
    <ellipse cx="100" cy="165" rx="62" ry="10" fill="#2A3A2A"/>
    <path d="M45 168 Q75 162 100 168 Q125 174 155 168" stroke="#2A3A2A" stroke-width="1.5" fill="none"/>
    <path d="M52 172 Q80 167 108 172 Q130 177 148 172" stroke="#2A3A2A" stroke-width="1" fill="none"/>
  </g>

  <!-- 몸통 — 먹 번짐 -->
  <g filter="url(#brush)">
    <ellipse cx="100" cy="138" rx="48" ry="32" fill="#2A3520" opacity="0.82"/>
    <ellipse cx="100" cy="132" rx="36" ry="22" fill="#1A2414" opacity="0.45"/>
    <!-- 배 부분 — 연한 빛 -->
    <ellipse cx="100" cy="148" rx="28" ry="16" fill="#3D4A2A" opacity="0.3"/>
  </g>

  <!-- 앞다리 -->
  <g filter="url(#brush)" opacity="0.78">
    <path d="M62 148 Q50 158 42 162 Q36 166 34 170" stroke="#2A3520" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M34 170 Q30 172 28 170 M34 170 Q32 175 30 176 M34 170 Q36 174 35 177" stroke="#2A3520" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M138 148 Q150 158 158 162 Q164 166 166 170" stroke="#2A3520" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M166 170 Q170 172 172 170 M166 170 Q168 175 170 176 M166 170 Q164 174 165 177" stroke="#2A3520" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 뒷다리 -->
  <g filter="url(#brush)" opacity="0.72">
    <path d="M72 160 Q58 170 48 178 Q42 183 38 188" stroke="#2A3520" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M128 160 Q142 170 152 178 Q158 183 162 188" stroke="#2A3520" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 머리 -->
  <g filter="url(#brush)">
    <ellipse cx="100" cy="110" rx="42" ry="30" fill="#2A3520" opacity="0.85"/>
    <ellipse cx="100" cy="104" rx="30" ry="20" fill="#1A2414" opacity="0.4"/>
  </g>

  <!-- 눈 — 크고 도드라진 -->
  <g filter="url(#brush)">
    <ellipse cx="72" cy="98" rx="14" ry="12" fill="#2A3520" opacity="0.9"/>
    <ellipse cx="128" cy="98" rx="14" ry="12" fill="#2A3520" opacity="0.9"/>
    <!-- 눈 흰자 -->
    <ellipse cx="72" cy="96" rx="8" ry="7" fill="#E8DFC0" opacity="0.7"/>
    <ellipse cx="128" cy="96" rx="8" ry="7" fill="#E8DFC0" opacity="0.7"/>
    <!-- 눈동자 -->
    <ellipse cx="72" cy="97" rx="5" ry="5" fill="#0E0A04" opacity="0.9"/>
    <ellipse cx="128" cy="97" rx="5" ry="5" fill="#0E0A04" opacity="0.9"/>
    <!-- 눈 하이라이트 -->
    <circle cx="74" cy="95" r="1.5" fill="#FAF5E8" opacity="0.8"/>
    <circle cx="130" cy="95" r="1.5" fill="#FAF5E8" opacity="0.8"/>
  </g>

  <!-- 고막 — 식별 포인트 (눈보다 큰 원) -->
  <g filter="url(#soft)">
    <circle cx="58" cy="108" r="11" fill="none" stroke="#1C150A" stroke-width="2" opacity="0.5"/>
    <circle cx="142" cy="108" r="11" fill="none" stroke="#1C150A" stroke-width="2" opacity="0.5"/>
    <circle cx="58" cy="108" r="8" fill="#2A2A18" opacity="0.2"/>
    <circle cx="142" cy="108" r="8" fill="#2A2A18" opacity="0.2"/>
  </g>

  <!-- 낙관 -->
  <rect x="160" y="158" width="26" height="26" rx="2" fill="#B03020" opacity="0.15"/>
  <text x="173" y="176" text-anchor="middle" font-size="7" fill="#B03020" opacity="0.5" font-family="serif">황소</text>
</svg>
