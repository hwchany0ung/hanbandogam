name: Generate Story

on:
  workflow_dispatch:
    inputs:
      name:
        description: '종 한국명'
        required: true
        type: string

concurrency:
  group: story-${{ inputs.name }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_PUSH_TOKEN }}
          fetch-depth: 1

      - name: Check if story already exists
        id: check
        run: |
          NAME="${{ inputs.name }}"
          STORIES_FILE="frontend/data/stories.json"
          if [ -f "$STORIES_FILE" ]; then
            EXISTING=$(python3 -c "import json; d=json.load(open('$STORIES_FILE',encoding='utf-8')); print('yes' if '$NAME' in d and len(d['$NAME'])>30 else 'no')")
          else
            EXISTING="no"
          fi
          echo "skip=$([ "$EXISTING" = "yes" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate via Claude
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_NAME: ${{ inputs.name }}
        run: |
          python scripts/generate_story.py "${INPUT_NAME}"

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          NAME="${{ inputs.name }}"
          if ! git diff --quiet frontend/data/stories.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add frontend/data/stories.json
            git commit -m "feat(story): auto-generate ${NAME} via claude"
            git push origin main
          else
            echo "::notice::No changes to stories.json"
          fi

      - name: Skip summary
        if: steps.check.outputs.skip == 'true'
        run: echo "::notice::Skipped — story already exists for ${{ inputs.name }}"
