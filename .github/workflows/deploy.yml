name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt --quiet

      - name: Run pytest
        run: pytest backend/tests/ -v || [ $? -eq 5 ]

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/hanbando.pem
          chmod 600 /tmp/hanbando.pem

      - name: Package code
        run: |
          tar czf /tmp/hanbando.tar.gz \
            --exclude='.git' \
            --exclude='*.db' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='infra' \
            --exclude='.bkit' \
            --exclude='.claude' \
            --exclude='memory' \
            --exclude='docs' \
            --exclude='poc' \
            --exclude='video' \
            .

      - name: Copy to EC2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          DOMAIN: ${{ secrets.DOMAIN }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          GITHUB_DISPATCH_TOKEN: ${{ secrets.ADMIN_PUSH_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_REGION: ap-northeast-2
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          # umask 077 + chmod 600 → /tmp/.env 가 다른 러너 프로세스에 노출되지 않도록
          # echo 블록: printf 포맷 스트링 취약점 회피 (값에 % 가 있어도 안전, YAML 들여쓰기 무관)
          umask 077
          {
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
            echo "UPSTAGE_API_KEY=$UPSTAGE_API_KEY"
            echo "DOMAIN=$DOMAIN"
            echo "CORS_ORIGINS=$CORS_ORIGINS"
            echo "DATABASE_URL=sqlite:///./hanbando.db"
            echo "APP_DEMO_MODE=0"
            echo "GITHUB_DISPATCH_TOKEN=$GITHUB_DISPATCH_TOKEN"
            echo "GITHUB_REPO=hwchany0ung/hanbandogam"
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
            echo "AWS_S3_BUCKET_NAME=$AWS_S3_BUCKET_NAME"
            echo "AWS_REGION=$AWS_REGION"
            echo "REPLICATE_API_TOKEN=$REPLICATE_API_TOKEN"
          } > /tmp/.env
          chmod 600 /tmp/.env
          scp -i /tmp/hanbando.pem -o StrictHostKeyChecking=no \
            /tmp/hanbando.tar.gz /tmp/.env \
            ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Deploy on EC2
        run: |
          ssh -i /tmp/hanbando.pem -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} << 'SSHEOF'
          set -euo pipefail
          APP_DIR=/home/ec2-user/hanbando
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          tar xzf /tmp/hanbando.tar.gz

          # .env 갱신 (GITHUB_DISPATCH_TOKEN 등 최신 키 주입)
          cp /tmp/.env "$APP_DIR/.env"
          chmod 600 "$APP_DIR/.env"

          if [ ! -d venv ]; then
            python3.11 -m venv venv
          fi
          source venv/bin/activate
          pip install -r backend/requirements.txt --quiet

          python -m backend.db.seed 2>/dev/null || true

          # backend 가 실제로 사용하는 DB 경로 (backend/hanbando.db)
          DB="backend/hanbando.db"
          sqlite3 "$DB" "ALTER TABLE collection ADD COLUMN lat REAL" 2>/dev/null || true
          sqlite3 "$DB" "ALTER TABLE collection ADD COLUMN lng REAL" 2>/dev/null || true
          sqlite3 "$DB" "ALTER TABLE collection ADD COLUMN district TEXT" 2>/dev/null || true
          sqlite3 "$DB" "ALTER TABLE species ADD COLUMN story TEXT" 2>/dev/null || true

          # 실사진 경로 마이그레이션: /assets/photos/*.jpg → *.png (따오기 제외, PNG 없음)
          sqlite3 "$DB" "UPDATE collection SET image_path = REPLACE(image_path, '.jpg', '.png') WHERE image_path LIKE '/assets/photos/%.jpg' AND korean_name != '따오기';" 2>/dev/null || true

          sudo systemctl daemon-reload
          sudo systemctl enable hanbando
          sudo systemctl restart caddy
          sudo systemctl restart hanbando || true

          sleep 3
          curl -sf http://localhost:8000/health \
            && echo "[deploy] 완료 $(date)" \
            || echo "[deploy] warning: health check failed — check backend logs"
          SSHEOF
